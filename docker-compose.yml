services:
  db:
    image: postgres:15-alpine
    container_name: nabohjelp-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nabohjelp
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nabohjelp-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nabohjelp-backend
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=nabohjelp;Username=admin;Password=password
      - ASPNETCORE_ENVIRONMENT=Production
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - nabohjelp-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: nabohjelp-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
    depends_on:
      - backend
    networks:
      - nabohjelp-network

volumes:
  postgres_data:

networks:
  nabohjelp-network:
    driver: bridge
