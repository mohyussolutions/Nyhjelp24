name: Azure Bicep Production Deploy

on:
  push:
    branches:
      - main
    branches-ignore:
      - test
    paths:
      - "productions/**"
      - ".github/workflows/azure-bicep-production.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Azure Container Registry Login
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/nyhjelp24-backend:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/nyhjelp24-frontend:latest

      - name: Deploy Bicep to Resource Group
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template: productions/main.bicep
          parameters: |
            location=${{ secrets.AZURE_LOCATION }}
            environment=production
            backendImage=${{ secrets.ACR_LOGIN_SERVER }}/nyhjelp24-backend:latest
            frontendImage=${{ secrets.ACR_LOGIN_SERVER }}/nyhjelp24-frontend:latest
          failOnStdErr: false
